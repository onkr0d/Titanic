# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: CD - Firebase Hosting
on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      # don't deploy frontend when functions change
      - '!frontend/functions/**'
      - '.github/workflows/firebase-hosting-merge.yml'

permissions:
  contents: read

jobs:
  build_and_deploy_frontend:
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: SpicyPizza/create-envfile@v2.0
        with:
          envkey_VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          envkey_VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          envkey_VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          envkey_VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          envkey_VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          envkey_VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          envkey_VITE_FIREBASE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_FIREBASE_RECAPTCHA_SITE_KEY }}
          envkey_VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          fail_on_empty: true
          directory: frontend
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Deploy to Firebase Hosting (tolerate no-op releases)
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          FIREBASE_SERVICE_ACCOUNT_TITANIC_UPLOADER: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TITANIC_UPLOADER }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_TITANIC_UPLOADER" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"

          # version pinned for string matching
          set +e
          deploy_out=$(bunx firebase-tools@15.22.3 deploy --only hosting --project titanic-uploader --non-interactive 2>&1)
          deploy_code=$?
          set -e
          printf '%s\n' "$deploy_out"

          if [ "$deploy_code" -ne 0 ]; then
            # tolerate the no-op release (rebuilt bundle identical to what's already live)
            if printf '%s' "$deploy_out" | grep -qE "is the current active version|FAILED_PRECONDITION"; then
              echo "::notice::bundle unchanged; skipping no-op hosting release"
              exit 0
            fi
            exit "$deploy_code"
          fi
