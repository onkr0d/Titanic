name: CI - Tests

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Python unit tests (backend) ──────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    if: >-
      contains(toJSON(github.event.pull_request.title), '[no-test]') == false
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        # Stdlib-only tests, so the exact 3.x doesn't matter; 3.13 keeps the job
        # fast and broadly available across runners.
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest

  # ── Rust unit + integration tests ────────────────────────────────
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    if: >-
      contains(toJSON(github.event.pull_request.title), '[no-test]') == false
    defaults:
      run:
        working-directory: titanic

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            titanic/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('titanic/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --verbose

  # ── E2E Docker tests ─────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Docker)
    runs-on: ubuntu-latest
    if: >-
      contains(toJSON(github.event.pull_request.title), '[no-test]') == false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build images with cache
        run: |
          docker buildx bake -f docker-compose.test.yml \
            --set 'umbrel.cache-from=type=gha,scope=e2e-umbrel' \
            --set 'umbrel.cache-to=type=gha,mode=max,scope=e2e-umbrel' \
            --set 'quart.cache-from=type=gha,scope=e2e-quart' \
            --set 'quart.cache-to=type=gha,mode=max,scope=e2e-quart' \
            --load

      - name: Start services
        run: docker compose -f docker-compose.test.yml up -d --no-build

      - name: Run E2E tests
        run: bash tests/e2e/test_e2e.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
