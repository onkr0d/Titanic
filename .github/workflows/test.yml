name: CI - Tests

on:
  pull_request:
    paths:
      - 'titanic/**'
      - 'backend/**'
      - 'tests/**'
      - 'docker-compose.test.yml'
      - '.github/workflows/test.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust unit + integration tests ────────────────────────────────
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    if: >-
      contains(toJSON(github.event.pull_request.title), '[no-test]') == false
    defaults:
      run:
        working-directory: titanic

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            titanic/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('titanic/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --verbose

  # ── E2E Docker tests ─────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Docker)
    runs-on: ubuntu-latest
    if: >-
      contains(toJSON(github.event.pull_request.title), '[no-test]') == false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and start services
        run: docker compose -f docker-compose.test.yml up --build -d

      - name: Run E2E tests
        run: bash tests/e2e/test_e2e.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
