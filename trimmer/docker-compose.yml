services:
  app:
    image: ghcr.io/onkr0d/titanic/trimmer:latest
    user: "0:0"
    restart: unless-stopped
    ports:
      - "${APP_TRIMMER_PORT:-3030}:3030"
    environment:
      - RUST_LOG=info
      - MEDIA_PATH=/downloads
      - DATA_DIR=/data
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${UMBREL_ROOT}/home/Downloads:/downloads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3030/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
